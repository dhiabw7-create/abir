version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: medflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-medflow}
      MYSQL_USER: ${MYSQL_USER:-medflow}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-medflow}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: ["--default-authentication-plugin=mysql_native_password"]

  redis:
    image: redis:7-alpine
    container_name: medflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: medflow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: medflow-api
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
      - minio
    environment:
      NODE_ENV: development
      PORT: 3000
      WEB_ORIGIN: http://localhost:5173
      DATABASE_URL: mysql://medflow:medflow@mysql:3306/medflow
      JWT_ACCESS_SECRET: replace_me_access_secret
      JWT_REFRESH_SECRET: replace_me_refresh_secret
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 7d
      COOKIE_SECURE: "false"
      REDIS_URL: redis://redis:6379
      STORAGE_MODE: local
      STORAGE_LOCAL_PATH: ./uploads
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: medflow
    volumes:
      - .:/workspace
      - api_node_modules:/workspace/node_modules
    ports:
      - "3000:3000"
    command: >
      sh -c "npm install &&
      npm run prisma:generate -w @medflow/api &&
      npm run prisma:migrate -w @medflow/api &&
      npm run prisma:seed -w @medflow/api &&
      npm run start:dev -w @medflow/api"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: medflow-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:3000
    volumes:
      - .:/workspace
      - web_node_modules:/workspace/node_modules
    ports:
      - "5173:5173"
    command: >
      sh -c "npm install &&
      npm run dev -w @medflow/web -- --host 0.0.0.0"

volumes:
  mysql_data:
  redis_data:
  minio_data:
  api_node_modules:
  web_node_modules:
